## PostgreSQL Configuration Highlights

Edit
/etc/postgresql/17/main/postgresql.conf

Important parameters:
-Edit /etc/postgresql/17/main/postgresql.conf for cluster primary startup and register (same config for both nodes)

data_directory = '/db/data'            # use data in another directory
hba_file = '/etc/postgresql/17/main/pg_hba.conf'        # host-based authentication file
ident_file = '/etc/postgresql/17/main/pg_ident.conf'    # ident configuration file
external_pid_file = '/var/run/postgresql/17-main.pid'                   # write an extra PID file
listen_addresses = '*'          # what IP address(es) to listen on;
port = 5432                             # (change requires restart)
max_connections = 500                   # (change requires restart)
unix_socket_directories = '/var/run/postgresql/' # comma-separated list of directories
shared_buffers = 64GB                   # min 128kB
temp_buffers = 256MB                    # min 800kB
work_mem = 128MB                                # min 64kB
maintenance_work_mem = 8GB              # min 64kB
dynamic_shared_memory_type = posix      # the default is usually the first option
effective_io_concurrency = 256          # 1-1000; 0 disables prefetching
max_worker_processes = 100              # (change requires restart)
max_parallel_workers_per_gather = 32    # limited by max_parallel_workers
max_parallel_workers = 64               # number of max_worker_processes that
wal_level = replica                     # minimal, replica, or logical
fsync = on                              # flush data to disk for crash safety
synchronous_commit = remote_write               # synchronization level;
full_page_writes = on                   # recover from partial page writes
wal_log_hints = on                      # also do full page writes of non-critical updates
wal_compression = zstd                  # enables compression of full-page writes;
wal_buffers = 64MB                      # min 32kB, -1 sets based on shared_buffers
checkpoint_timeout = 15min              # range 30s-1d
checkpoint_completion_target = 0.9      # checkpoint target duration, 0.0 - 1.0
max_wal_size = 64GB
min_wal_size = 4GB
archive_mode = on               # enables archiving; off, on, or always
archive_command = 'zstd -q -3 %p -o /nfs/archive/%f.zst'                # command to use to archive a WAL file
archive_timeout = 60            # force a WAL file switch after this
restore_command = '[ -f /nfs/archive/%f.zst ] && zstd -d /nfs/archive/%f.zst -c > %p || exit 1'
max_wal_senders = 10            # max number of walsender processes
max_replication_slots = 10      # max number of replication slots
wal_keep_size = 20GB            # in megabytes; 0 disables
synchronous_standby_names = '*' # standby servers that provide sync rep
hot_standby = on                        # "off" disallows queries during recovery
random_page_cost = 4.0                  # same scale as above
parallel_setup_cost = 1000.0            # same scale as above
parallel_tuple_cost = 0.1               # same scale as above
effective_cache_size = 192GB
default_statistics_target = 100 # range 1-10000
jit = off                               # allow JIT compilation
logging_collector = on          # Enable capturing of stderr, jsonlog,
log_directory = '/db/log'                      # directory where log files are written,
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log' # log file name pattern,
log_rotation_age = 1d                   # Automatic rotation of logfiles will
log_rotation_size = 1GB         # Automatic rotation of logfiles will
log_min_error_statement = 'error'       # values in order of decreasing detail:
log_line_prefix = '%m [%p] %q%u@%d '            # special values:
log_lock_waits = 'on'                   # log lock waits >= deadlock_timeout
log_statement = 'mod'                   # none, ddl, mod, all
log_timezone = 'Etc/UTC'
cluster_name = '17/main'                        # added to process titles if nonempty
autovacuum_max_workers = 10             # max number of autovacuum subprocesses
autovacuum_naptime = 10         # time between autovacuum runs
default_toast_compression = lz4 # 'pglz' or 'lz4'
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.UTF-8'             # locale for system error message
lc_monetary = 'en_US.UTF-8'             # locale for monetary formatting
lc_numeric = 'en_US.UTF-8'              # locale for number formatting
lc_time = 'en_US.UTF-8'                 # locale for time formatting
default_text_search_config = 'pg_catalog.english'
shared_preload_libraries = 'repmgr, timescaledb, pg_cron'
cron.database_name = 'marketdata'
max_locks_per_transaction = 1024                # min 10
include_dir = 'conf.d'                  # include files ending in '.conf' from
timescaledb.last_tuned = '2025-09-10T20:40:19+05:30'
timescaledb.last_tuned_version = '0.18.0'
timescaledb.max_background_workers = 64
